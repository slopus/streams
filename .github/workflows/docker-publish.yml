name: Publish container image

# Release flow: pushing a tag like `v1.2.3` builds and publishes a multi-arch
# image to GHCR. Also runnable on demand via the Actions UI.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  # ghcr.io/slopus/streams
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    name: build + push (linux/amd64, linux/arm64)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU (for arm64 emulation)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image tags and labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # Full semver from the git tag: v1.2.3 -> 1.2.3
            type=semver,pattern={{version}}
            # Major.minor: v1.2.3 -> 1.2
            type=semver,pattern={{major}}.{{minor}}
            # `latest` only for real version tags (not pre-releases).
            type=semver,pattern=latest
            # Manual workflow_dispatch runs get tagged with the short SHA.
            type=sha,enable=${{ github.event_name == 'workflow_dispatch' }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Provenance + SBOM attestations for supply-chain hygiene.
          provenance: true
          sbom: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
