name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Nightly full gate.
  schedule:
    - cron: "0 3 * * *"
  # Allow running the full gate, optionally with the exhaustive crash matrix, from
  # the Actions tab.
  workflow_dispatch:
    inputs:
      exhaustive:
        description: "Run the exhaustive crash matrix"
        required: false
        default: false
        type: boolean

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  quick-gate:
    name: quick gate
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust 1.96.0
        uses: dtolnay/rust-toolchain@1.96.0
        with:
          components: rustfmt

      - name: Cache cargo registry and build
        uses: Swatinem/rust-cache@v2

      - name: Quick gate
        run: ./scripts/test-quick.sh

  full-gate:
    name: full gate
    runs-on: ubuntu-latest
    # Not the default PR/push path. The full gate runs nightly and on manual
    # dispatch. The exhaustive crash matrix is still opt-in via workflow input.
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    env:
      TOPICS_TEST_EXHAUSTIVE: ${{ github.event_name == 'workflow_dispatch' && inputs.exhaustive && '1' || '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust 1.96.0
        uses: dtolnay/rust-toolchain@1.96.0
        with:
          components: rustfmt

      - name: Cache cargo registry and build
        uses: Swatinem/rust-cache@v2

      - name: Install docs dependencies
        run: npm ci
        working-directory: docs-app

      - name: Full gate
        run: ./scripts/test-full.sh
